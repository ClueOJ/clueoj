server {
    listen       80;
    listen       [::]:80;
    listen       443 ssl;
    listen       [::]:443;
    ssl_certificate         /etc/ssl/fullchain.pem;
    ssl_certificate_key     /etc/ssl/key2.pem;
    server_name oj.clue.edu.vn;

    error_log /var/log/nginx/error.log;    

    client_max_body_size 1000M;

    add_header X-UA-Compatible "IE=Edge,chrome=1";
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    charset utf-8;
    try_files $uri @icons;
    error_page 502 504 /502.html;

    location ~ ^/502\.html$|^/logo\.png$|^/robots\.txt$ {
        root /assets/;
    }

    location @icons {
        root /assets/resources/icons/;
        log_not_found off;
        error_page 403 = @uwsgi;
        error_page 404 = @uwsgi;
    }

    location @uwsgi {
        uwsgi_read_timeout 600;
        uwsgi_pass site:8000;
        include uwsgi_params;
        uwsgi_param SERVER_SOFTWARE nginx/$nginx_version;
    }

    location /static {
        gzip_static on;
        expires max;
        root /assets/;
    }

    location /martor {
        root /media/;
    }

    location /pdf {
        root /media/;
    }

    location /submission_file {
        root /media/;
    }

    location /userdatacache {
        internal;
        root /;
    }

    location /contestdatacache {
        internal;
        root /;
    }

    location /event/ {
        proxy_pass http://wsevent:15100/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /channels/ {
        proxy_read_timeout          120;
        proxy_pass http://wsevent:15102;
    }

    location /search/ {
        # Dấu '/' ở cuối rất quan trọng để nginx cắt tiền tố /search/
        # thay vì đẩy nguyên cục /search/api/... vào Flask
        proxy_pass http://search_app:8000/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Tăng timeout vì model LLM/Embedding xử lý query có thể mất vài giây
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
    }
}

